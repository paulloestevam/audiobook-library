server:
  servlet:
    context-path: /audiobook-library
  port: 8086

spring:
  application:
    name: audiobook-library
  data:
    mongodb:
      #      uri:             mongodb://admin:password@localhost:27017/audiobook_db?authSource=admin&connectTimeoutMS=10000&socketTimeoutMS=60000
      uri: ${MONGO_URI:mongodb://admin:password@localhost:27017/audiobook_db?authSource=admin}
  servlet:
    multipart:
      max-file-size: 1500MB
      max-request-size: 1500MB
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth?prompt=select_account

jwt:
  secret: ${JWT_SECRET}
  expiration: 2592000000 # 1 mes em ms

admin:
  initial-email: ${INITIAL_ADMIN_EMAIL}

app:
  # Use barras normais / mesmo no Windows, o Java entende e evita erros de escape
  base-dir: ${BASE_DIR}
  downloads-dir: "${app.base-dir}downloads"
  images-dir: "${app.base-dir}images"
  frontend-url: ${FRONTEND_URL:http://localhost:5173}

# java -jar audiobook-library.jar --file.base-dir=/var/lib/audiobook-library/

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics"
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true